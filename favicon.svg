<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradSmall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a227;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cyanGradSmall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded bg -->
  <rect width="32" height="32" fill="#0a0a0a" rx="6"/>
  
  <!-- Three bars trending up -->
  <rect x="4" y="18" width="6" height="9" fill="url(#goldGradSmall)" rx="1"/>
  <rect x="13" y="13" width="6" height="14" fill="url(#goldGradSmall)" rx="1"/>
  <rect x="22" y="6" width="6" height="21" fill="url(#cyanGradSmall)" rx="1"/>
</svg>
